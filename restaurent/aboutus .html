<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>My Kitchen</title>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Top Bar -->
  <div class="bg-gray-200 text-center py-2 text-sm">
    Subscribe to our newsletter - <span class="font-semibold">mykitchen@gmail.com</span>
  </div>

  <!-- Navbar -->
  <header class="bg-white px-6 py-4 shadow-sm">
    <div class="flex items-center justify-between">
      
      <!-- Logo -->
      <div class="text-xl font-semibold border px-4 py-2 rounded-full border-gray-300">
        <span class="text-red-500">My</span> Kitchen
      </div>

      <!-- Search -->
      <div class="flex items-center gap-3">
        <input 
          type="text" 
          placeholder="Search"
          class="border-b border-gray-400 focus:outline-none px-2 py-1"
        />
        <button class="bg-red-500 text-white p-2 rounded-full">
          🔍
        </button>
      </div>
    </div>

    <!-- Menu -->
    <nav class="mt-6 border-t pt-4">
      <ul class="flex gap-8 font-medium text-gray-700">
        <li class="text-red-500">HOME</li>
        <li>RECIPES</li>
        <li>BLOG</li>
        <li>ABOUT ME</li>
      </ul>
    </nav>
  </header>
